<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Power-Ai Coach – Login</title>

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0a0f24, #1c2a4a);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .login-container {
      background: rgba(255, 255, 255, 0.05);
      padding: 40px;
      border-radius: 16px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 0 40px rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
    }

    h1 {
      font-size: 36px;
      margin-bottom: 10px;
      font-weight: 700;
    }

    p {
      font-size: 18px;
      opacity: 0.85;
      margin-bottom: 30px;
    }

    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: white;
      color: #333;
      padding: 14px 20px;
      border-radius: 8px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      border: none;
      width: 100%;
    }

    .google-btn:hover {
      background: #e6e6e6;
    }

    .google-icon {
      width: 24px;
      height: 24px;
    }

    footer {
      margin-top: 30px;
      font-size: 14px;
      opacity: 0.6;
    }
  </style>
</head>

<body>
  <div class="login-container">
    <h1>Power‑Ai Coach</h1>
    <p>Logga in för att skapa din AI analys av din träning och hälsa.</p>

    <button class="google-btn" id="loginBtn">
      <img class="google-icon" src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg">
      Logga in med Google
    </button>

    <footer>
      © 2026 Power‑Ai Coach
    </footer>
  </div>

  <script>
    // === GOOGLE LOGIN ===

    function handleCredentialResponse(response) {
      const data = JSON.parse(atob(response.credential.split('.')[1]));

      // Spara användarinfo i webbläsaren
      localStorage.setItem("userName", data.name);
      localStorage.setItem("userEmail", data.email);
      localStorage.setItem("userPicture", data.picture);
      localStorage.setItem("userId", data.sub); // Unik Google-ID

      // Skicka användaren vidare till dashboard
      window.location.href = "dashboard.html";
    }

    window.onload = function () {
      google.accounts.id.initialize({
        client_id: "DIN_GOOGLE_CLIENT_ID_HÄR",
        callback: handleCredentialResponse
      });

      document.getElementById("loginBtn").addEventListener("click", () => {
        google.accounts.id.prompt();
      });
    };
  </script>
</body>
</html>
